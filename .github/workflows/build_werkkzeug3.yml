name: build_werkkzeug3

on:
  push:
    branches: [ "master", "trace" ]
  pull_request:
    branches: [ "master", "trace" ]
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: werkkzeug3_kkrieger/wz3projects.sln
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install DirectX SDK (June 2010)
        shell: powershell
        run: |
          # Установка через Chocolatey — это самый надежный метод в Azure/GitHub инфраструктуре
          choco install directx-sdk -y
          
          # Установка пути к SDK (Chocolatey ставит его по стандартному пути)
          $dxPath = "C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)"
          echo "DXSDK_DIR=$dxPath" >> $env:GITHUB_ENV
          
      - name: Build Base Console
        shell: powershell
        run: |
          $env:Path += ";" + $pwd.Path + "\yasm-1.3.0\;"
          msbuild 'werkkzeug3_kkrieger/base_console/base_console.vcxproj' `
            /p:Configuration=Release /p:Platform=Win32 `
            /p:VC_LibraryPath_x86="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Lib\x86" `
            /p:VC_IncludePath="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Include"

      - name: Build Werkkzeug Solution
        shell: powershell
        run: |
          $env:Path += ";" + $pwd.Path + "\yasm-1.3.0\;"
          msbuild ${{ env.SOLUTION_FILE_PATH }} `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:BuildProjectReferences=true `
            /p:ForceImportBeforeCppTargets="$($pwd.Path)\fix.props" `
            /p:VC_LibraryPath_x86="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Lib\x86" `
            /p:VC_IncludePath="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Include"

      - name: Build GenThree
        shell: powershell
        run: |
          $env:Path += ";" + $pwd.Path + "\yasm-1.3.0\;"
          msbuild 'genthree/genthree.sln' `
            /p:Configuration=Release /p:Platform=Win32 `
            /p:VC_LibraryPath_x86="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Lib\x86" `
            /p:VC_IncludePath="C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\Include"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kkrieger-Werkkzeug-Binaries
          path: |
            **/*.exe
            !obj/**
