name: Build Werkkzeug3 VS2022
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup YASM
        shell: powershell
        run: |
          # Используем папку yasm из репозитория
          $yasmPath = Join-Path $env:GITHUB_WORKSPACE "yasm"
          echo "$yasmPath" >> $env:GITHUB_PATH
          
      - name: Build Solution
        run: |
          msbuild werkkzeug3.sln /p:Configuration=Release /p:Platform=Win32

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: kkrieger_binaries
          path: |
            **/*.exe
